version: '3.8'

# 메인 docker-compose.yml을 건드리지 않고,
# 로컬 개발 환경에서만 Graph RAG(Neo4j)를 띄우기 위한 별도의 Compose 파일입니다.
# 실행 방법: docker-compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  # 로컬 개발 환경용 포트 개방 오버라이드
  db:
    ports:
      - "5432:5432"
  
  redis:
    ports:
      - "6379:6379"

  ai:
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://host.docker.internal:8080

  neo4j:
    image: neo4j:5
    container_name: anook-neo4j-local
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-anook2026}  # (환경변수 처리, 기본값: neo4j/anook2026)
    ports:
      - "7474:7474" # HTTP UI 대시보드 (그래프 시각화)
      - "7687:7687" # Bolt 포트 (AI 백엔드 통신용)
    volumes:
      - neo4j-local-data:/data
    networks:
      - Anook-network

volumes:
  neo4j-local-data:

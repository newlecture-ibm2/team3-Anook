spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/anook_db}
    username: ${SPRING_DATASOURCE_USERNAME:anook_user}
    password: ${SPRING_DATASOURCE_PASSWORD:anook2026}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always                # schema.sql, data.sql 항상 실행

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jpa:
    defer-datasource-initialization: true   # SQL 스크립트를 Hibernate 초기화 이후 실행
    hibernate:
      ddl-auto: none              # SQL 스크립트로 스키마 관리 (Hibernate 자동 DDL 비활성화)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:default-local-secret-key-for-anook-1234567890}
  expiration-time: 86400000 # 24 hours in ms # 24 hours in ms

server:
  port: 8080

# AI 서비스 (Python FastAPI)
ai:
  service:
    enabled: true  # AI 서버 완성 후 true로 변경 → PythonAiHttpAdapter 활성화
    url: ${AI_SERVER_URL:http://localhost:8000}


# ============================================================
# Anook CI/CD Pipeline (Self-hosted Runner)
# ============================================================
# 트리거: main 브랜치 push
# 흐름: checkout → .env 생성 → rsync 동기화 → docker compose build → health check
# ============================================================

name: Anook Deploy

on:
  push:
    branches: [ dev ] # 아늑 프로젝트는 main 브랜치 기준

jobs:
  deploy:
    runs-on: self-hosted # 미니PC에 설치된 Github Runner를 직접 사용! (SSH 접속 불필요)

    # ⭐ 프로젝트에 필요한 환경변수들 (나중에 Github Secrets/Variables 에 추가해야 함)
    env:
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DB_PORT: ${{ vars.DB_PORT }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      NEO4J_USER: ${{ vars.NEO4J_USER }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      # 추가로 필요한 환경변수가 생기면 여기에 계속 추가하세요.

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 최신 소스를 서버의 실제 서비스 디렉토리로 동기화
      - name: Sync to workspace
        run: |
          mkdir -p ~/workspace/team3-Anook
          rsync -a --delete --exclude='.git' --exclude='__pycache__' ./ ~/workspace/team3-Anook/

      # 3. .env 파일 생성 (docker-compose가 환경변수를 읽을 수 있게 함)
      - name: Generate .env file
        run: |
          cd ~/workspace/team3-Anook
          cat > .env << 'ENVEOF'
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          DB_PORT=${{ vars.DB_PORT }}
          FRONTEND_PORT=${{ vars.FRONTEND_PORT }}
          NEO4J_USER=${{ vars.NEO4J_USER }}
          NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
          SPRING_PROFILE=prod
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      # 4. Docker Compose 로 빌드 & 배포
      - name: Build and Deploy
        run: |
          cd ~/workspace/team3-Anook
          docker compose down
          docker compose up -d --build

      # 5. Health Check (배포 정상 확인)
      - name: Health Check
        run: |
          cd ~/workspace/team3-Anook
          echo "⏳ Waiting for services to start..."
          sleep 30

          echo "🔍 Checking Frontend (Next.js)..."
          curl -f http://localhost:${FRONTEND_PORT:-3000} || exit 1
          echo "✅ Frontend OK"

          echo "🔍 Checking Backend (via docker network)..."
          docker compose exec -T backend curl -sf http://localhost:8080/actuator/health || echo "⚠️ Backend health endpoint not yet configured (skipping)"
          echo "✅ Health Check Done"

      # 6. 불필요한 쓰레기 이미지 정리
      - name: Cleanup
        run: docker image prune -f

      # 7. Rollback (문제가 생겼을 때 이전 커밋으로 되돌리기 - 필요시 주석 해제)
      # - name: Rollback on failure

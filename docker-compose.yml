version: '3.8'

services:
  # 1. Nginx 리버스 프록시 (미니PC 환경에서는 호스트 Nginx 사용하므로 주석 처리. AWS 배포 시 주석 해제)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf # 방금 생성한 설정 파일 매핑
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - Anook-network
  # 2. PostgreSQL + pgvector (RAG 용)
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data # 데이터 영구 저장
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - Anook-network

  # 2-1. Redis (이미지 임시 캐싱 및 세션용)
  redis:
    image: redis:alpine
    container_name: anook-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    restart: on-failure
    networks:
      - Anook-network

  # 3. Spring Boot 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-prod}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KOREAEXIM_AUTH_KEY=${KOREAEXIM_AUTH_KEY}
      - AI_SERVER_URL=http://ai:8000
      - SPRING_DATA_REDIS_HOST=redis
    ports:
      - "127.0.0.1:8080:8080"  # 호스트 Nginx만 접근 가능 (외부 차단)
    depends_on:
      db:
        condition: service_healthy   # DB가 실제로 준비된 후에만 시작
      redis:
        condition: service_started
    restart: on-failure              # 실패 시 자동 재시작
    networks:
      - Anook-network

  # 4. AI 서버 (FastAPI)
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: anook-ai
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-2.5-flash}
      - GEMINI_AB_MODEL=${GEMINI_AB_MODEL:-}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET:--1}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - BACKEND_URL=http://backend:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - ./ai:/app # 소스 코드 실시간 동기화 (Hot Reload)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: on-failure
    networks:
      - Anook-network

  # 5. 프론트엔드 (Next.js / React PWA)
  frontend:
    build:
      context: ./frontend # 향후 프론트엔드 폴더(Dockerfile 위치)를 지정하세요
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - BACKEND_URL=http://backend:8080
      - AI_SERVER_URL=http://ai:8000
    networks:
      - Anook-network

  # 6. Neo4j (Graph RAG용 데이터베이스)
  neo4j:
    image: neo4j:5
    container_name: anook-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    # 배포용이므로 7474, 7687 포트를 외부에 열지 않아 보안을 유지합니다.
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - Anook-network

volumes:
  db-data:
  redis-data:
  neo4j-data:


networks:
  Anook-network:
    driver: bridge
